name: Mypy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mypy-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r PySpotObserver/requirements.txt
          pip install mypy

      - name: Run mypy delta check
        run: |
          set -euo pipefail
          mkdir -p .mypy-stats

          echo "Running mypy on PR branch..."
          mypy . --show-error-codes --no-error-summary --no-pretty > .mypy-stats/pr.txt || true

          git checkout origin/main --quiet

          echo "Running mypy on main..."
          mypy . --show-error-codes --no-error-summary --no-pretty > .mypy-stats/main.txt || true

          git checkout - --quiet

          # Normalize output enough for stable comparison.
          # Keeps file, line, message, and error code.
          sort .mypy-stats/pr.txt > .mypy-stats/pr.sorted.txt
          sort .mypy-stats/main.txt > .mypy-stats/main.sorted.txt

          comm -23 .mypy-stats/pr.sorted.txt .mypy-stats/main.sorted.txt > .mypy-stats/new.txt
          comm -13 .mypy-stats/pr.sorted.txt .mypy-stats/main.sorted.txt > .mypy-stats/fixed.txt

          NEW=$(wc -l < .mypy-stats/new.txt | tr -d ' ')
          FIXED=$(wc -l < .mypy-stats/fixed.txt | tr -d ' ')

          echo "New mypy errors: $NEW"
          echo "Fixed mypy errors: $FIXED"

          if [ "$NEW" -gt 0 ]; then
            echo ""
            echo "New mypy errors introduced by this PR:"
            cat .mypy-stats/new.txt
            exit 1
          fi